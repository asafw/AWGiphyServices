name: Swift CI

on:
  push:
    branches: [main]
    paths: ['Sources/**', 'Tests/**', 'Package.swift', '.github/workflows/swift.yml']
  pull_request:
    paths: ['Sources/**', 'Tests/**', 'Package.swift', '.github/workflows/swift.yml']

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test
